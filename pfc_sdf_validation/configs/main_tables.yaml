output_root: results
schemes:
  - event_aware_midpoint
  - event_aware_midpoint_impulse_corrected
  - event_aware_midpoint_work_consistent
  - event_aware_midpoint_work_consistent_consistent_traction
benchmarks:
  analytic_flat:
    initial_gap: 0.05
    initial_velocity: -1.0
    mass: 1.0
    contact_stiffness: 100.0
    t_final: 0.60
    dt: 0.01
  analytic_sphere:
    initial_gap: 0.05
    initial_velocity: -1.0
    mass: 1.0
    sphere_radius: 1.0
    sphere_stiffness: 12.0
    plane_stiffness: 18.0
    t_final: 1.50
    dt: 0.01
    controller:
      max_depth: 4
      work_mismatch_relative_tol: 0.02
  native_band_flat:
    initial_gap: 0.05
    initial_velocity: -1.0
    mass: 1.0
    contact_stiffness: 64.0
    t_final: 0.55
    dt: 0.01
    controller:
      max_depth: 0
      work_mismatch_relative_tol: 0.05
    model:
      mass: 1.0
      law_a_stiffness: 200.0
      law_b_stiffness: 200.0
      max_depth_a: 0.2
      max_depth_b: 0.2
      band:
        eta: 8.0
        band_half_width: 12.0
      grid:
        origin: [-0.4, -0.4, -0.1]
        spacing: [0.2, 0.2, 0.01]
        shape: [4, 4, 20]
      footprint:
        width: 0.8
        height: 0.8
      continuity:
        use_warm_start: true
        boundary_only_update: true
        dilation_radius: 1
      traction:
        consistent_reconstruction: true
